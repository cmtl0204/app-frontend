<p-dialog
    [modal]="true"
    [visible]="customMessageService.modalVisible()"
    [closable]="false"
    [style]="{ width: '30rem' }">

    <ng-template #header>
        <div class="text-center">
            <h6>{{ customMessageService.modalTitle }}</h6>
        </div>
    </ng-template>

    <ng-template #content>
        @if (Array.isArray(customMessageService.modalMessage)) {

            @for (group of groupedMessages(); track group.label) {

                <h5>{{ group.label }}</h5>

                <ul>
                    @for (error of group.errors; track error) {
                        <li>
                            <i
                                [class]="customMessageService.modalIcon"
                                [style]="{'color': customMessageService.modalIconColor}">
                            </i>

                            {{ error }}
                        </li>
                    }
                </ul>

                <p-divider />
            }
        }
    </ng-template>

    <ng-template #footer>
        <div class="flex justify-content-center gap-2">
            <p-button
                label="Cerrar"
                [severity]="customMessageService.modalAcceptSeverity"
                [icon]="CustomIcons.XMARK_SOLID"
                (click)="customMessageService.setModalVisible(false)" />
        </div>
    </ng-template>
</p-dialog>
